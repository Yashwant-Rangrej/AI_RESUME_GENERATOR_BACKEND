services:
  - type: web
    name: ai-resume-generator-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
      - key: ENV
        value: production
      - key: CORS_ORIGINS
        value: "*" # Change this to your frontend URL after deployment
      - key: PYTHON_VERSION
        value: 3.10.0
